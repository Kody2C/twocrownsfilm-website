# Build Vite site and deploy to GitHub Pages (Settings → Pages → Source: GitHub Actions).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Set base path for GitHub Pages
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            # Relative base: works at custom domain (/) and at user.github.io/<repo>/
            echo "path=./" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_CONTACTS_WEB_APP_URL: ${{ secrets.VITE_CONTACTS_WEB_APP_URL }}
          VITE_CONTACT_FORM_SECRET: ${{ secrets.VITE_CONTACT_FORM_SECRET }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
